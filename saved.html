<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevStack — Saved</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="logo" href="/index.html">
          <span class="logo-mark">&lt;/&gt;</span> DevStack
        </a>
        <nav class="main-nav" aria-label="Primary">
          <a class="nav-link" href="/index.html">Dashboard</a>
          <a class="nav-link is-active" href="/saved.html">
            Saved <span id="saved-count" class="count-pill">0</span>
          </a>
        </nav>
      </div>
    </header>

    <main class="saved-page">
      <h1 class="page-title">Saved items</h1>
      <div id="saved-feed" class="card-grid" aria-live="polite"></div>
    </main>

    <div id="repo-modal" class="modal-overlay" hidden>
      <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      >
        <button class="modal-close" aria-label="Close dialog">&times;</button>
        <div id="modal-body"></div>
      </div>
    </div>

    <script type="module" src="/js/saved.js"></script>
  </body>
</html>
