<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevStack — Saved</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>

    <header class="site-header">
      <div class="header-inner">
        <a class="logo" href="/index.html">
          <span class="logo-bracket">{</span> DevStack <span class="logo-bracket">}</span>
        </a>
        <nav class="main-nav" aria-label="Primary">
          <a class="nav-link" href="/index.html">Home</a>
          <a class="nav-link is-active" href="/saved.html">
            Saved <span id="saved-count" class="count-pill">0</span>
          </a>
        </nav>
      </div>
    </header>

    <main class="saved-page">
      <div class="saved-page-head">
        <h1>Saved Items</h1>
        <span class="page-subtitle" id="saved-subtitle"></span>
      </div>
      <div id="saved-feed" class="card-grid" aria-live="polite"></div>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <span class="footer-text">DevStack &mdash; GitHub API + Dev.to API</span>
      </div>
    </footer>

    <div id="repo-modal" class="modal-overlay" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="modal-close" aria-label="Close dialog">&times;</button>
        <div class="modal-header" id="modal-header-zone"></div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>

    <!-- Mobile bottom navigation -->
    <nav class="bottom-nav" aria-label="Mobile navigation">
      <div class="bottom-nav-inner">
        <a class="bottom-nav-link" href="/index.html">
          <span class="bottom-nav-icon">⌂</span>
          Home
        </a>
        <a class="bottom-nav-link is-active" href="/saved.html">
          <span class="bottom-nav-icon">♥</span>
          Saved
        </a>
      </div>
    </nav>

    <script type="module" src="/js/saved.js"></script>
  </body>
</html>
